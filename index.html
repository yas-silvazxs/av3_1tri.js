<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Cadastro Moderno</title>
</head>
<body>
    <main class="container">
        <h1>Cadastro de Clientes</h1>
        
        <div class="tabs-wrapper">
            <input type="radio" name="tab-control" id="tab1" checked>
            <input type="radio" name="tab-control" id="tab2">
            <input type="radio" name="tab-control" id="tab3">

            <ul class="tab-list">
                <li><label for="tab1"><span>Pessoal</span></label></li>
                <li><label for="tab2"><span>Contato</span></label></li>
                <li><label for="tab3"><span>Endereço</span></label></li>
            </ul>
                 
                <script>
                    function pesquisarCEP(){
                        const cep = document.getElementById("ceṕ").value
                        const link = 'https://viacep.com.br/ws' + cep + '/json/?callback=preencherEndereco'
                        var script = document.createElement("script")
                        script.src = link
                        document.body.appendChild(script)

                    }
                    function preencherEndereco(conteudo){
                    
                        resposta.textContent = JSON.stringify(conteudo)

                    }    

                </script>

            <div class="content">
             
                <section class="section section-tab1">
                    <div class="input-group">
                        <label for="nome">NOME COMPLETO</label>
                        <input type="text" id="nome" placeholder="Ex: Maria Silva" required>
                    </div>
                    <div class="input-group">
                        <label for="cpf_val">CPF</label>
                        <input type="text" id="cpf_val" placeholder="000.000.000-00" required>
                    </div>
                    <div class="input-group">
                        <label for="date_val">DATA DE NASCIMENTO</label>
                        <input type="date" id="date_val" required>
                    </div>
                </section>

        
                <section class="section section-tab2">
                    <div class="input-group">
                        <label for="email_val">EMAIL</label>
                        <input type="email" id="email_val" placeholder="email@exemplo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="cel_val">CELULAR</label>
                        <input type="tel" id="cel_val" placeholder="(99) 99999-9999" required>
                    </div>
                </section>

         
                <section class="section section-tab3">
                    <div class="input-group">
                        <label for="cep">CEP</label>
                        <input type="text" id="cep" placeholder="00000-000" onblur="pesquisarCEP(this.value)" required>
                        <p id="resposta"></p>
                    </div>
                    <div class="row">
                        <div class="input-group flex-3">
                            <label for="rua_val">RUA</label>
                            <input type="text" id="rua_val" placeholder="Nome da rua">
                        </div>
                        <div class="input-group flex-1">
                            <label for="num_val">Nº</label>
                            <input type="text" id="num_val" placeholder="123">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="bairro_val">BAIRRO</label>
                        <input type="text" id="bairro_val" placeholder="Bairro">
                    </div>
                    <div class="row">
                        <div class="input-group flex-2">
                            <label for="cidade_val">CIDADE</label>
                            <input type="text" id="cidade_val" placeholder="Cidade">
                        </div>
                        <div class="input-group flex-1">
                            <label for="uf_val">ESTADO (UF)</label>
                            <input type="text" id="uf_val" placeholder="SP">
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <div class="form-footer">
            <button type="submit" class="btn-submit">Enviar Cadastro</button>
        </div>
    </main>
</body>
</html>
