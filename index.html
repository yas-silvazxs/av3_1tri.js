<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Cadastro Moderno</title>
</head>
<body>
    <main class="container">
        <h1>Cadastro de Clientes</h1>
        
        <form id="formCadastro">
            <div class="tabs-wrapper">
                <input type="radio" name="tab-control" id="tab1" checked>
                <input type="radio" name="tab-control" id="tab2">
                <input type="radio" name="tab-control" id="tab3">

                <ul class="tab-list">
                    <li><label for="tab1"><span>Pessoal</span></label></li>
                    <li><label for="tab2"><span>Contato</span></label></li>
                    <li><label for="tab3"><span>Endereço</span></label></li>
                </ul>

                <div class="content">
                    <!-- ABA 1: DADOS PESSOAIS -->
                    <section class="section section-tab1">
                        <div class="input-group">
                            <label for="nome">NOME COMPLETO</label>
                            <input type="text" id="nome" name="nome" placeholder="Ex: Maria Silva" required>
                        </div>
                        <div class="input-group">
                            <label for="cpf">CPF</label>
                            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
                        </div>
                        <div class="input-group">
                            <label for="senha">SENHA</label>
                            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                        </div>
                    </section>

                    <!-- ABA 2: CONTATO -->
                    <section class="section section-tab2">
                        <div class="input-group">
                            <label for="email">EMAIL</label>
                            <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>
                        </div>
                        <div class="input-group">
                            <label for="telefone">TELEFONE</label>
                            <input type="tel" id="telefone" name="telefone" placeholder="(99) 99999-9999" required>
                        </div>
                    </section>

                    <!-- ABA 3: ENDEREÇO -->
                    <section class="section section-tab3">
                        <div class="input-group">
                            <label for="cep">CEP</label>
                            <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9" required>
                            <div id="msgCep" style="color: #e74c3c; font-size: 0.9em; margin-top: 5px;"></div>
                        </div>
                        <div class="row">
                            <div class="input-group flex-3">
                                <label for="rua">RUA</label>
                                <input type="text" id="rua" name="rua" placeholder="Nome da rua" readonly>
                            </div>
                            <div class="input-group flex-1">
                                <label for="numero">NÚMERO</label>
                                <input type="text" id="numero" name="numero" placeholder="123" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="bairro">BAIRRO</label>
                            <input type="text" id="bairro" name="bairro" placeholder="Bairro" readonly>
                        </div>
                        <div class="row">
                            <div class="input-group flex-2">
                                <label for="cidade">CIDADE</label>
                                <input type="text" id="cidade" name="cidade" placeholder="Cidade" readonly>
                            </div>
                            <div class="input-group flex-1">
                                <label for="estado">ESTADO (UF)</label>
                                <input type="text" id="estado" name="estado" placeholder="SP" readonly>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <div class="form-footer">
                <button type="submit" class="btn-submit">Enviar Cadastro</button>
            </div>
        </form>
    </main>

    <script>
        // ✅ FUNÇÃO PRINCIPAL DA API VIACEP - COM TRATAMENTO DE ERROS
        function pesquisarCEP() {
            const cep = document.getElementById("cep").value.replace(/\D/g, '');
            const msgCep = document.getElementById("msgCep");
            
            // Limpa mensagens anteriores
            msgCep.textContent = '';
            limparEndereco();
            
            // Validação básica do CEP
            if (cep.length !== 8) {
                msgCep.textContent = 'CEP deve conter 8 números';
                return;
            }
            
            // Loading
            msgCep.textContent = '🔍 Buscando CEP...';
            
            // ✅ USO DO FETCH MODERNO (melhor que JSONP)
            fetch(`https://viacep.com.br/ws/${cep}/json/`)
                .then(response => response.json())
                .then(data => {
                    if (data.erro) {
                        msgCep.textContent = '❌ CEP não encontrado';
                    } else {
                        preencherEndereco(data);
                        msgCep.textContent = '✅ Endereço encontrado!';
                    }
                })
                .catch(error => {
                    msgCep.textContent = '❌ Erro na conexão. Tente novamente.';
                    console.error('Erro ViaCEP:', error);
                });
        }

        // ✅ PREENCHE OS CAMPOS DO ENDEREÇO
        function preencherEndereco(data) {
            document.getElementById("rua").value = data.logradouro || '';
            document.getElementById("bairro").value = data.bairro || '';
            document.getElementById("cidade").value = data.localidade || '';
            document.getElementById("estado").value = data.uf || '';
        }

        // ✅ LIMPA OS CAMPOS DO ENDEREÇO
        function limparEndereco() {
            document.getElementById("rua").value = '';
            document.getElementById("bairro").value = '';
            document.getElementById("cidade").value = '';
            document.getElementById("estado").value = '';
        }

        // ✅ MÁSCARAS DE DIGITAÇÃO
        document.getElementById('cep').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/(\d{5})(\d)/, '$1-$2');
            e.target.value = value;
        });

        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = value;
        });

        document.getElementById('telefone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.replace(/(\d{2})(\d)/, '($1) $2');
            value = value.replace(/(\d{4,5})(\d)/, '$1-$2');
            e.target.value = value;
        });

        // ✅ BUSCAR CEP AO SAIR DO CAMPO
        document.getElementById('cep').addEventListener('blur', pesquisarCEP);

        // ✅ ENVIO DO FORMULÁRIO
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                senha: document.getElementById('senha').value,
                cep: document.getElementById('cep').value,
                rua: document.getElementById('rua').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value
            };

            // Validação endereço
            if (!dados.rua || !dados.bairro || !dados.cidade || !dados.estado) {
                alert('⚠️ Preencha o endereço buscando o CEP primeiro!');
                return;
            }

            console.log('✅ CADASTRO REALIZADO:', dados);
            alert('🎉 Cadastro enviado com sucesso!\nVerifique o console (F12)');
        });
    </script>
</body>
</html>
